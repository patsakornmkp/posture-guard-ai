<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ · PostureGuard</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/buttons.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/setup.css">
    <link rel="stylesheet" href="../css/monitoring.css">
    <link rel="stylesheet" href="../css/summary.css">
    <link rel="stylesheet" href="../css/history.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <main class="auth-page">
        <div class="auth-box">
            <h1 class="logo">PostureGuard</h1>
            <p class="tagline">ระบบตรวจจับท่าทางเพื่อลด Office Syndrome</p>

            <form id="loginForm">
                <div class="field">
                    <label for="username">Username</label>
                    <input type="text" id="username" required>
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>

                <div id="message" class="message" hidden></div>

                <button type="submit" id="submitBtn">เข้าสู่ระบบ</button>
            </form>

            <p class="switch">
                ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิก</a>
            </p>
        </div>
    </main>

    <script src="../js/app.js"></script>
    <script src="../js/login.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เริ่มใช้งาน · PostureGuard</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/buttons.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="../css/setup.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>

<body>
    <div id="header"></div>

    <main class="dashboard">
        <section class="panel setup-panel">
            <h2 class="panel-title">เริ่มการใช้งาน</h2>
            <p class="panel-desc">กดปุ่มด้านล่างเพื่อเริ่มตรวจจับท่าทางแบบ realtime</p>

            <button class="btn-primary btn-large" id="startBtn" type="button">
                ▶ เริ่มใช้งาน
            </button>

            <p class="setup-status is-info" id="setupStatus" aria-live="polite"></p>

            <p class="hint-text">
                ตั้งกล้องให้อยู่ด้านข้างตัวคุณ ระบบจะตรวจจับและเตือนเมื่อท่าทางผิด
            </p>
        </section>
    </main>

    <div id="footer"></div>

    <script src="../js/app.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/setup.js"></script>
</body>

</html>

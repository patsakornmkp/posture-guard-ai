<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก · PostureGuard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="auth-page">
        <div class="auth-box">
            <h1 class="logo">PostureGuard</h1>
            <p class="tagline">สร้างบัญชีใหม่</p>

            <form id="registerForm">
                <div class="field">
                    <label for="fullName">ชื่อ-นามสกุล</label>
                    <input type="text" id="fullName">
                </div>

                <div class="field">
                    <label for="username">Username</label>
                    <input type="text" id="username" required minlength="3">
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" required minlength="4">
                </div>

                <div id="message" class="message" hidden></div>

                <button type="submit" id="submitBtn">สมัครสมาชิก</button>
            </form>

            <p class="switch">
                มีบัญชีอยู่แล้ว? <a href="login.html">เข้าสู่ระบบ</a>
            </p>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');
            const btn = document.getElementById('submitBtn');

            msg.hidden = true;
            btn.disabled = true;
            btn.textContent = 'กำลังสมัคร...';

            try {
                await api.register(username, password, fullName);
                const user = await api.login(username, password);
                localStorage.setItem('currentUser', JSON.stringify(user));
                window.location.href = 'dashboard.html';
            } catch (err) {
                msg.hidden = false;
                msg.textContent = err.message || 'สมัครไม่สำเร็จ';
                btn.disabled = false;
                btn.textContent = 'สมัครสมาชิก';
            }
        });
    </script>
</body>
</html>
